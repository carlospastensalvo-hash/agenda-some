<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda SOME — CESFAM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#111}
.app{max-width:1200px;margin:0 auto;padding:1rem}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:1.5rem}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1.5px solid #ddd;flex-wrap:wrap}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#666;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:600}
.btn{padding:7px 13px;border-radius:7px;border:1px solid #ccc;background:#fff;color:#111;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background 0.12s;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-blue{background:#185FA5;color:#fff;border-color:#185FA5}.btn-blue:hover{background:#0C447C}
.btn-green{background:#3B6D11;color:#fff;border-color:#3B6D11}.btn-green:hover{background:#27500A}
.btn-red{color:#A32D2D;border-color:#A32D2D;background:transparent}.btn-red:hover{background:#FFEBEE}
.btn-sm{padding:4px 9px;font-size:11px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:#666}
.fg input,.fg select{padding:6px 9px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;font-size:12px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;user-select:none;transition:all .12s}
.chip.sel{transform:scale(1.06);box-shadow:0 0 0 2.5px #333}
.list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f8f8f8;border-radius:6px;margin-bottom:5px;flex-wrap:wrap;border:1px solid #eee}
.badge-rend{font-size:10px;padding:2px 7px;border-radius:20px;background:#E3F2FD;color:#0D47A1;font-weight:500}
.badge-dia{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500}
.badge-lv{background:#E8F5E9;color:#1B5E20}
.badge-sab{background:#FFF3E0;color:#BF360C}
.badge-todos{background:#EDE7F6;color:#4527A0}
.dia-banner{padding:9px 14px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* AGENDA TABLE */
.agenda-wrap{overflow-x:auto}
.agenda-tbl{border-collapse:collapse;font-size:11px;min-width:400px}
.agenda-tbl th{padding:7px 9px;text-align:center;border:1px solid #777;background:#1a1a1a;color:#fff;font-size:11px;white-space:nowrap;min-width:115px}
.agenda-tbl th.hth{background:#0d0d0d;min-width:50px;width:50px}
.agenda-tbl td{border:1px solid #555;padding:0;height:25px}
.agenda-tbl td.htd{background:#252525;color:#bbb;font-size:10px;font-family:monospace;text-align:center;padding:2px 4px;white-space:nowrap}
.ccell{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.3px;user-select:none;padding:1px 4px;text-align:center;cursor:pointer;transition:opacity .1s}
.ccell:hover{opacity:.72}
.ccell.bloq{background:#2d2d2d!important;color:#444!important;cursor:default}
.ccell.libre{background:#131313;color:#2a2a2a}
.ccell.libre:hover{background:#222;color:#555}
.sep-row td{background:#080808;height:7px;border-color:#222}
.tot-row td{background:#111;color:#ddd;text-align:center;font-size:11px;font-weight:600;padding:4px;border-color:#444}
.tot-row td.htd{background:#080808}
@media print{
  .no-print{display:none!important}
  .tabs{display:none!important}
  body{background:#fff}
  .agenda-tbl{font-size:10px}
  .agenda-tbl th,.agenda-tbl td{border:1px solid #999}
  .card{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>
<div class="app">
  <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:0.5rem">
    <div>
      <h1>📋 Agenda SOME — CESFAM</h1>
      <div class="subtitle">Gestión diaria de cupos por box y sector</div>
    </div>
  </div>

  <div class="tabs no-print">
    <button class="tab active" onclick="goTab('agenda',this)">📋 Agenda</button>
    <button class="tab" onclick="goTab('profesionales',this)">👩‍⚕️ Profesionales</button>
    <button class="tab" onclick="goTab('config',this)">⚙️ Configuración</button>
  </div>

  <!-- AGENDA -->
  <div id="tab-agenda">
    <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="fg"><label>Fecha de atención</label>
          <input type="date" id="fecha" onchange="onFechaChange()">
        </div>
        <div id="fecha-lbl" style="font-size:12px;color:#666;margin-top:14px"></div>
      </div>
      <button class="btn btn-green" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir</button>
    </div>

    <div id="dia-banner" class="no-print"></div>

    <div class="no-print" style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:600;color:#666;margin-bottom:5px">Sector activo:</div>
      <div id="sect-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
      <div style="font-size:11px;font-weight:600;color:#666;margin-bottom:5px">Tipo de atención:</div>
      <div id="at-chips" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>

    <div class="no-print" style="font-size:11px;color:#888;margin-bottom:8px">
      <i class="ti ti-info-circle" style="vertical-align:-2px"></i>
      <b>Clic</b> = asignar &nbsp;·&nbsp; <b>Doble clic</b> = limpiar &nbsp;·&nbsp; <b>Clic derecho</b> = bloquear/desbloquear
    </div>

    <div id="agenda-title" style="text-align:center;font-weight:700;font-size:15px;margin-bottom:8px;text-transform:uppercase"></div>
    <div class="agenda-wrap"><div id="agenda-body"></div></div>
  </div>

  <!-- PROFESIONALES -->
  <div id="tab-profesionales" style="display:none">
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Agregar profesional</div>
      <div class="row" style="margin-bottom:10px">
        <div class="fg"><label>Nombre</label><input type="text" id="p-nom" placeholder="Dra. Apellido" style="width:150px"></div>
        <div class="fg"><label>Box N°</label><input type="text" id="p-box" placeholder="21" style="width:60px"></div>
        <div class="fg"><label>Tipo</label>
          <select id="p-tipo" style="width:120px">
            <option>Médico</option><option>Dentista</option><option>Matrona</option>
            <option>Kinesiólogo</option><option>TENS</option><option>Enfermero/a</option>
          </select>
        </div>
      </div>
      <div style="font-size:11px;color:#666;margin-bottom:6px">Marca los bloques que le corresponden:</div>
      <div id="b-checks" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px"></div>
      <button class="btn btn-blue" onclick="addProf()"><i class="ti ti-plus"></i> Agregar</button>
    </div>
    <div id="prof-list"></div>
  </div>

  <!-- CONFIG -->
  <div id="tab-config" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Bloques horarios</div>
        <div class="card">
          <div class="row" style="margin-bottom:8px">
            <div class="fg"><label>Nombre</label><input type="text" id="b-nom" placeholder="Nombre" style="width:100px"></div>
            <div class="fg"><label>Inicio</label><select id="b-ini" style="width:86px"></select></div>
            <div class="fg"><label>Fin</label><select id="b-fin" style="width:86px"></select></div>
            <div class="fg"><label>Días</label>
              <select id="b-dias" style="width:100px">
                <option value="todos">Todos</option>
                <option value="lv">Lun – Vie</option>
                <option value="sab">Sábado</option>
              </select>
            </div>
            <button class="btn btn-blue btn-sm" style="margin-top:auto" onclick="addBloque()"><i class="ti ti-plus"></i></button>
          </div>
          <div id="b-list"></div>
        </div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;margin-top:14px">Sectores</div>
        <div class="card">
          <div class="row" style="margin-bottom:8px">
            <div class="fg"><label>Nombre</label><input type="text" id="s-nom" placeholder="Sector A" style="width:110px"></div>
            <div class="fg"><label>Color</label><input type="color" id="s-col" value="#FF00FF" style="width:46px;height:30px;padding:2px"></div>
            <button class="btn btn-blue btn-sm" style="margin-top:auto" onclick="addSector()"><i class="ti ti-plus"></i></button>
          </div>
          <div id="s-list"></div>
        </div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Tipos de atención</div>
        <div class="card">
          <div class="row" style="margin-bottom:8px">
            <div class="fg"><label>Nombre</label><input type="text" id="a-nom" placeholder="MORBILIDAD" style="width:120px"></div>
            <div class="fg"><label>Rendimiento (min)</label><input type="number" id="a-rend" value="20" min="5" max="120" step="5" style="width:70px"></div>
            <button class="btn btn-blue btn-sm" style="margin-top:auto" onclick="addAtencion()"><i class="ti ti-plus"></i> Agregar</button>
          </div>
          <div id="a-list"></div>
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee">
            <button class="btn btn-sm" onclick="cargarDefecto()"><i class="ti ti-wand"></i> Restaurar configuración por defecto</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let BL=[],AT=[],SEC=[],PROF=[];
let AGENDA={};
let sectAct=null,atAct=null;
let _bid=0,_aid=0,_sid=0,_pid=0;

const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const m2t=m=>String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
function genHoras(ini,fin,rend){const h=[];let c=t2m(ini);const e=t2m(fin);while(c+rend<=e){h.push(m2t(c));c+=rend;}return h;}
function contrast(hex){if(!hex||hex.length<7)return'#000';const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#000':'#fff';}
function getSec(id){return SEC.find(s=>s.id===id)||null;}
function getAt(id){return AT.find(a=>a.id===id)||null;}
function getBL(id){return BL.find(b=>b.id===id)||null;}
function getDow(){const f=document.getElementById('fecha').value;if(!f)return-1;return new Date(f+'T12:00:00').getDay();}
function bloquesActivos(){
  const dow=getDow();if(dow<0)return BL;
  return BL.filter(b=>{
    if(b.dias==='todos')return true;
    if(b.dias==='lv')return dow>=1&&dow<=5;
    if(b.dias==='sab')return dow===6;
    return true;
  });
}

function renderSectChips(){
  const c=document.getElementById('sect-chips');c.innerHTML='';
  SEC.forEach(s=>{
    const d=document.createElement('div');
    d.className='chip'+(sectAct===s.id?' sel':'');
    d.style.cssText=`background:${s.color};color:${contrast(s.color)};border-color:${sectAct===s.id?contrast(s.color):'transparent'}`;
    d.textContent=s.nombre;
    d.onclick=()=>{sectAct=sectAct===s.id?null:s.id;renderSectChips();};
    c.appendChild(d);
  });
}
function renderAtChips(){
  const c=document.getElementById('at-chips');c.innerHTML='';
  AT.forEach(a=>{
    const d=document.createElement('div');
    d.className='chip'+(atAct===a.id?' sel':'');
    d.style.cssText=atAct===a.id?'background:#185FA5;color:#fff;border-color:#185FA5':'background:#f0f0f0;color:#111;border-color:transparent';
    d.innerHTML=`${a.nombre} <span style="font-size:10px;opacity:.7">${a.rend}min</span>`;
    d.onclick=()=>{atAct=atAct===a.id?null:a.id;renderAtChips();};
    c.appendChild(d);
  });
}

function renderAgenda(){
  const body=document.getElementById('agenda-body');
  const ba=bloquesActivos();
  const dow=getDow();
  if(dow===0){body.innerHTML='<div style="padding:2rem;text-align:center;color:#888">Domingo — sin atención programada</div>';return;}
  if(!PROF.length){body.innerHTML='<div style="padding:2rem;text-align:center;color:#888"><div style="font-size:28px;margin-bottom:8px">👩‍⚕️</div>Ve a <b>Profesionales</b> y agrega al menos uno</div>';return;}
  if(!ba.length){body.innerHTML='<div style="padding:2rem;text-align:center;color:#888">No hay bloques activos para este día</div>';return;}
  const minR=AT.length?Math.min(...AT.map(a=>a.rend)):20;
  const horaSet=new Set();
  ba.forEach(b=>genHoras(b.inicio,b.fin,minR).forEach(h=>horaSet.add(h)));
  const horas=[...horaSet].sort();
  if(!horas.length){body.innerHTML='<div style="padding:2rem;text-align:center;color:#888">Sin horas para mostrar</div>';return;}
  const sepAntes=new Set();
  for(let i=1;i<horas.length;i++){if(t2m(horas[i])-t2m(horas[i-1])>minR)sepAntes.add(horas[i]);}
  let html='<table class="agenda-tbl"><thead><tr><th class="hth">Hora</th>';
  PROF.forEach(p=>{html+=`<th>${p.nombre.toUpperCase()}<br><span style="font-weight:400;font-size:10px;opacity:.65">BOX ${p.box||'—'}</span></th>`;});
  html+='</tr></thead><tbody>';
  horas.forEach(hora=>{
    if(sepAntes.has(hora)){html+=`<tr class="sep-row"><td class="htd"></td>${PROF.map(()=>'<td></td>').join('')}</tr>`;}
    html+=`<tr><td class="htd">${hora}</td>`;
    PROF.forEach(p=>{
      if(!AGENDA[p.id])AGENDA[p.id]={};
      const enBloque=(p.bloques||[]).some(bid=>{const b=ba.find(x=>x.id===bid);return b&&t2m(hora)>=t2m(b.inicio)&&t2m(hora)<t2m(b.fin);});
      if(!enBloque){html+=`<td style="background:#0c0c0c;border-color:#1a1a1a"></td>`;return;}
      const c=AGENDA[p.id][hora]||{sec:null,at:null,bloq:false};
      const s=c.sec?getSec(c.sec):null;
      const a=c.at?getAt(c.at):null;
      const bg=c.bloq?'#2d2d2d':s?s.color:'#131313';
      const fg=c.bloq?'#444':s?contrast(s.color):'#2a2a2a';
      const txt=a?a.nombre:'';
      html+=`<td style="background:${bg}"><div class="ccell${c.bloq?' bloq':!s?' libre':''}" style="color:${fg}" onclick="cClick('${p.id}','${hora}')" ondblclick="cDbl('${p.id}','${hora}')" oncontextmenu="cRight(event,'${p.id}','${hora}')">${txt}</div></td>`;
    });
    html+='</tr>';
  });
  html+='<tr class="tot-row"><td class="htd">Total</td>';
  PROF.forEach(p=>{const n=Object.values(AGENDA[p.id]||{}).filter(c=>!c.bloq&&c.sec).length;html+=`<td>${n||''}</td>`;});
  html+='</tr></tbody></table>';
  body.innerHTML=html;
}

function cClick(pid,hora){
  if(!sectAct&&!atAct)return;
  if(!AGENDA[pid])AGENDA[pid]={};
  const c=AGENDA[pid][hora]||{};if(c.bloq)return;
  AGENDA[pid][hora]={sec:sectAct,at:atAct,bloq:false};renderAgenda();
}
function cDbl(pid,hora){if(!AGENDA[pid])AGENDA[pid]={};AGENDA[pid][hora]={sec:null,at:null,bloq:false};renderAgenda();}
function cRight(e,pid,hora){e.preventDefault();if(!AGENDA[pid])AGENDA[pid]={};const c=AGENDA[pid][hora]||{};AGENDA[pid][hora]={sec:null,at:null,bloq:!c.bloq};renderAgenda();}

function onFechaChange(){
  const f=document.getElementById('fecha').value;
  const lbl=document.getElementById('fecha-lbl');
  const banner=document.getElementById('dia-banner');
  const title=document.getElementById('agenda-title');
  if(!f){lbl.textContent='';banner.innerHTML='';title.textContent='AGENDA SOME CESFAM';renderAgenda();return;}
  const d=new Date(f+'T12:00:00');
  const dow=d.getDay();
  const txt=d.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  lbl.textContent='— '+txt;
  title.textContent='AGENDA SOME — '+txt.toUpperCase();
  if(dow===0){
    banner.innerHTML=`<div class="dia-banner" style="background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A"><i class="ti ti-alert-triangle"></i> Domingo — sin atención programada</div>`;
  }else if(dow===6){
    banner.innerHTML=`<div class="dia-banner" style="background:#FFF3E0;color:#BF360C;border:1px solid #FFCC80"><i class="ti ti-sun"></i> Sábado — solo bloque Mañana Sáb (09:00–13:00)</div>`;
  }else{
    banner.innerHTML=`<div class="dia-banner" style="background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7"><i class="ti ti-calendar-week"></i> Día hábil — Mañana 08:00–13:00 · Intermedio 13:00–14:00 · Tarde 13:00–17:00 · Extensión 17:00–20:00</div>`;
  }
  renderAgenda();
}

function renderBChecks(){
  const c=document.getElementById('b-checks');
  if(!BL.length){c.innerHTML='<span style="font-size:12px;color:#888">Primero define bloques en Configuración</span>';return;}
  const dL=d=>d==='lv'?'Lun–Vie':d==='sab'?'Sáb':'Todos';
  const dB=d=>d==='lv'?'badge-lv':d==='sab'?'badge-sab':'badge-todos';
  c.innerHTML=BL.map(b=>`
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:6px 11px;background:#f8f8f8;border-radius:6px;border:1px solid #e0e0e0">
      <input type="checkbox" value="${b.id}" style="cursor:pointer;width:14px;height:14px">
      <span>${b.nombre}</span>
      <span style="font-size:10px;font-family:monospace;color:#888">${b.inicio}–${b.fin}</span>
      <span class="badge-dia ${dB(b.dias)}">${dL(b.dias)}</span>
    </label>`).join('');
}

function addProf(){
  const nom=document.getElementById('p-nom').value.trim();
  const box=document.getElementById('p-box').value.trim();
  const tipo=document.getElementById('p-tipo').value;
  const checks=[...document.querySelectorAll('#b-checks input:checked')].map(x=>x.value);
  if(!nom){alert('Ingresa el nombre del profesional');return;}
  if(!checks.length){alert('Selecciona al menos un bloque horario');return;}
  const p={id:'p'+(++_pid),nombre:nom,box,tipo,bloques:checks};
  PROF.push(p);AGENDA[p.id]={};
  document.getElementById('p-nom').value='';document.getElementById('p-box').value='';
  document.querySelectorAll('#b-checks input').forEach(x=>x.checked=false);
  renderProfList();renderAgenda();
}
function delProf(id){PROF=PROF.filter(p=>p.id!==id);delete AGENDA[id];renderProfList();renderAgenda();}
function renderProfList(){
  const c=document.getElementById('prof-list');
  if(!PROF.length){c.innerHTML='<div style="padding:1rem;text-align:center;color:#888;font-size:13px">Sin profesionales</div>';return;}
  const dL=d=>d==='lv'?'L–V':d==='sab'?'Sáb':'';
  const dB=d=>d==='lv'?'badge-lv':d==='sab'?'badge-sab':'badge-todos';
  c.innerHTML=PROF.map(p=>{
    const btags=(p.bloques||[]).map(bid=>{const b=getBL(bid);if(!b)return'';return`<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:#fff;border:1px solid #ddd;color:#666">${b.nombre} <span class="badge-dia ${dB(b.dias)}">${dL(b.dias)}</span></span>`;}).join(' ');
    return`<div class="list-item"><span style="font-weight:600">${p.nombre}</span><span style="font-size:11px;padding:2px 7px;border-radius:20px;background:#fff;border:1px solid #ddd;color:#666">BOX ${p.box||'—'}</span><span style="font-size:11px;color:#888">${p.tipo}</span>${btags}<button class="btn btn-sm btn-red" onclick="delProf('${p.id}')"><i class="ti ti-trash"></i></button></div>`;
  }).join('');
}

function buildSel(id,def){
  const s=document.getElementById(id);s.innerHTML='';
  for(let m=420;m<=1200;m+=10){const t=m2t(m);const o=document.createElement('option');o.value=t;o.textContent=t;if(t===def)o.selected=true;s.appendChild(o);}
}
function addBloque(){
  const nom=document.getElementById('b-nom').value.trim()||'Bloque';
  const ini=document.getElementById('b-ini').value;const fin=document.getElementById('b-fin').value;
  const dias=document.getElementById('b-dias').value;
  if(t2m(ini)>=t2m(fin)){alert('La hora de inicio debe ser menor que la de fin');return;}
  BL.push({id:'b'+(++_bid),nombre:nom,inicio:ini,fin,dias});
  renderBList();renderBChecks();renderAgenda();document.getElementById('b-nom').value='';
}
function delBloque(id){BL=BL.filter(b=>b.id!==id);PROF.forEach(p=>{p.bloques=(p.bloques||[]).filter(x=>x!==id);});renderBList();renderBChecks();renderProfList();renderAgenda();}
function renderBList(){
  const c=document.getElementById('b-list');
  const dL=d=>d==='lv'?'Lun–Vie':d==='sab'?'Sábado':'Todos';
  const dB=d=>d==='lv'?'badge-lv':d==='sab'?'badge-sab':'badge-todos';
  c.innerHTML=BL.length?BL.map(b=>`<div class="list-item"><span style="font-weight:600;font-size:12px">${b.nombre}</span><span style="font-size:11px;font-family:monospace;color:#888">${b.inicio}–${b.fin}</span><span class="badge-dia ${dB(b.dias)}">${dL(b.dias)}</span><button class="btn btn-sm btn-red" onclick="delBloque('${b.id}')"><i class="ti ti-trash"></i></button></div>`).join(''):'<div style="font-size:12px;color:#888">Sin bloques</div>';
}
function addAtencion(){
  const nom=document.getElementById('a-nom').value.trim().toUpperCase();
  const rend=parseInt(document.getElementById('a-rend').value)||20;
  if(!nom)return;AT.push({id:'a'+(++_aid),nombre:nom,rend});if(!atAct)atAct=AT[0].id;
  renderAList();renderAtChips();renderAgenda();document.getElementById('a-nom').value='';
}
function delAt(id){AT=AT.filter(a=>a.id!==id);if(atAct===id)atAct=AT[0]?.id||null;renderAList();renderAtChips();renderAgenda();}
function renderAList(){
  const c=document.getElementById('a-list');
  c.innerHTML=AT.length?AT.map(a=>`<div class="list-item"><span style="font-weight:700;font-size:12px">${a.nombre}</span><span class="badge-rend">${a.rend} min</span><button class="btn btn-sm btn-red" onclick="delAt('${a.id}')"><i class="ti ti-trash"></i></button></div>`).join(''):'<div style="font-size:12px;color:#888">Sin tipos de atención</div>';
}
function addSector(){
  const nom=document.getElementById('s-nom').value.trim();const col=document.getElementById('s-col').value;
  if(!nom)return;SEC.push({id:'s'+(++_sid),nombre:nom,color:col});renderSList();renderSectChips();document.getElementById('s-nom').value='';
}
function delSec(id){SEC=SEC.filter(s=>s.id!==id);if(sectAct===id)sectAct=null;renderSList();renderSectChips();}
function renderSList(){
  const c=document.getElementById('s-list');
  c.innerHTML=SEC.length?SEC.map(s=>`<div class="list-item"><div style="width:18px;height:18px;border-radius:3px;background:${s.color};border:1px solid rgba(0,0,0,.2);flex-shrink:0"></div><span style="font-weight:600;font-size:12px">${s.nombre}</span><button class="btn btn-sm btn-red" onclick="delSec('${s.id}')"><i class="ti ti-trash"></i></button></div>`).join(''):'<div style="font-size:12px;color:#888">Sin sectores</div>';
}
function goTab(id,btn){
  ['agenda','profesionales','config'].forEach(t=>document.getElementById('tab-'+t).style.display=t===id?'block':'none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  if(id==='profesionales')renderBChecks();
}
function cargarDefecto(){
  BL=[];AT=[];SEC=[];_bid=0;_aid=0;_sid=0;
  BL=[
    {id:'b'+(++_bid),nombre:'Mañana',     inicio:'08:00',fin:'13:00',dias:'lv'},
    {id:'b'+(++_bid),nombre:'Intermedio', inicio:'13:00',fin:'14:00',dias:'lv'},
    {id:'b'+(++_bid),nombre:'Tarde',      inicio:'13:00',fin:'17:00',dias:'lv'},
    {id:'b'+(++_bid),nombre:'Extensión',  inicio:'17:00',fin:'20:00',dias:'lv'},
    {id:'b'+(++_bid),nombre:'Mañana Sáb', inicio:'09:00',fin:'13:00',dias:'sab'},
  ];
  AT=[
    {id:'a'+(++_aid),nombre:'MORBILIDAD',rend:20},
    {id:'a'+(++_aid),nombre:'CURSO',     rend:20},
    {id:'a'+(++_aid),nombre:'PADDS',     rend:20},
    {id:'a'+(++_aid),nombre:'MORBI FUN', rend:20},
    {id:'a'+(++_aid),nombre:'CRÓNICO',   rend:30},
    {id:'a'+(++_aid),nombre:'HD',        rend:30},
    {id:'a'+(++_aid),nombre:'INFORME',   rend:30},
  ];
  atAct=AT[0].id;
  SEC=[
    {id:'s'+(++_sid),nombre:'Sector 1',        color:'#FF00FF'},
    {id:'s'+(++_sid),nombre:'Sector 2',        color:'#FFFF00'},
    {id:'s'+(++_sid),nombre:'Sector 3',        color:'#00CC00'},
    {id:'s'+(++_sid),nombre:'Sector 4',        color:'#FF0000'},
    {id:'s'+(++_sid),nombre:'Sector 5',        color:'#0070C0'},
    {id:'s'+(++_sid),nombre:'Ventanilla Pref.',color:'#FFA500'},
  ];
  renderBList();renderAList();renderSList();renderSectChips();renderAtChips();renderBChecks();renderProfList();renderAgenda();
}
buildSel('b-ini','08:00');buildSel('b-fin','13:00');
const hoy=new Date();hoy.setDate(hoy.getDate()+1);
document.getElementById('fecha').value=hoy.toISOString().split('T')[0];
cargarDefecto();onFechaChange();
</script>
